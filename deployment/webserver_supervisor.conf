[fcgi-program:sharpie-web]
socket=tcp://localhost:8000

# The directory directive sets the CWD for Daphne, which Django uses to
# locate .env and db.sqlite3. Any script invoking Django must also cd here first.
directory=/var/www/sharpie/webserver/

environment=PATH=/var/www/sharpie/venv/bin/

command=/bin/bash -c "/bin/mkdir -p /run/daphne && exec daphne -u /run/daphne/daphne%(process_num)d.sock --fd 0 --access-log - --proxy-headers sharpie.webserver.server.asgi:application"

numprocs=1

process_name=sharpie-web%(process_num)d

autostart=true
autorestart=true

stdout_logfile=/var/www/sharpie/logs/asgi.log
redirect_stderr=true