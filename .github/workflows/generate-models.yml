name: Generate Data Model Diagram

on:
  push:
    branches:
      - main

jobs:
  generate-models:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install django-extensions pygraphviz
          pip install -r requirements.txt

      - name: Generate model diagram
        run: |
          cd webserver
          python manage.py graph_models accounts experiment data runner -o ../docs/source/_static/data_model.png

      - name: Commit and push diagram
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/source/_static/data_model.png
          git diff --quiet && git diff --staged --quiet || git commit -m "Update data model diagram [skip ci]"
          git push