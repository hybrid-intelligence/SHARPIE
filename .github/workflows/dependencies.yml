name: Update Dependencies

on:
  push:
    branches: [main, dev]
    paths:
      - 'requirements.txt'
      - 'docs/requirements.txt'
  workflow_dispatch:

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-licenses
        pip install -r requirements.txt
        pip install -r docs/requirements.txt
    
    - name: Generate license report
      run: |
        pip-licenses --from=classifier --format=markdown --output-file=DEPENDENCIES_PIP.md
    
    - name: Upload license report
      uses: actions/upload-artifact@v4
      with:
        name: dependencies-report
        path: DEPENDENCIES_PIP.md
    
    - name: Print license summary
      run: |
        python -c "
        import subprocess
        import json
        result = subprocess.run(['pip-licenses', '--from=classifier', '--format=json'], 
                               capture_output=True, text=True)
        packages = json.loads(result.stdout)
        print('Dependency licenses:')
        for pkg in packages:
            print(f\"  {pkg['Name']}: {pkg['License']}\")
        "
      continue-on-error: true